<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title if title else "AI Resume Screening System" }}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="app-wrapper">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <h4>AI Resume</h4>
            <span>Screening System</span>
        </div>

        <ul class="sidebar-menu">
            <li><a href="#">Dashboard</a></li>
            <li><a href="#">Jobs</a></li>
            <li><a href="#">Resumes</a></li>
            <li><a href="#">Candidates</a></li>
            <li><a href="#">Ranking</a></li>
            <li><a href="#">Reports</a></li>
            <li><a href="#">Analytics</a></li>
            <li><a href="#">Profile</a></li>
        </ul>
    </aside>

    <!-- Main Area -->
    <main class="main-content">

        <!-- Top Navbar -->
        <nav class="topbar">
            <div>
                <h5 class="mb-0">{{ page_title if page_title else "Dashboard" }}</h5>
                <small>Professional AI-powered recruitment platform</small>
            </div>

            <div class="admin-box">
                <span>Admin / HR</span>
            </div>
        </nav>

        <!-- Page Content -->
        <section class="content-area">
            {% block content %}{% endblock %}
        </section>

    </main>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>
</html>
